welcome:
  - "I'm a Senior Software Engineer at Microsoft specializing in AI and agent platforms, focused on building scalable systems and thoughtful developer experiences. I currently work in the Core AI division, contributing to Azure AI Foundry Agent Platform and Azure OpenAI."
  - "I graduated from the University of Connecticut in 2021 with a degree in Computer Science & Engineering, concentrating in Computational Data Analytics (now renamed as the Artificial Intelligence concentration). I grew a deep interest in machine learning early on, applying it through projects like my web application to predict college basketball game outcomes."
  - "I'm known for my focus on fundamentals: building platforms that scale, asking hard questions, mentoring others, and holding high standards in service of the team. Outside of work, I play clarinet and saxophone in the Microsoft Open Orchestra and remain a committed college basketball fan."

highlights:
  - icon: north-star
    text: Arctic Code Vault Contributor
  - icon: star
    text: Pro
    badge: true
  - icon: mortar-board
    text: GitHub Campus Expert

posts_limit: 6

